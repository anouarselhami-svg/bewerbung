<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex,nofollow,noarchive,nosnippet" />
    <title>Dashboard Admin Leads</title>
    <style>
      :root {
        --bg: #f5efe4;
        --surface: #ffffff;
        --text: #1f2c43;
        --muted: #5a6478;
        --border: #e3d7c6;
        --accent: #8b0000;
        --ok: #196c2e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: var(--text);
        background: radial-gradient(circle at 10% 10%, #ffedc8 0, transparent 28%), var(--bg);
      }

      .wrap {
        width: min(1100px, calc(100% - 1.5rem));
        margin: 1.5rem auto 2rem;
        display: grid;
        gap: 0.9rem;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 1rem;
      }

      h1,
      h2 {
        margin: 0 0 0.7rem;
      }

      p {
        margin: 0;
        color: var(--muted);
      }

      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 0.6rem;
        align-items: center;
      }

      .filters {
        margin-top: 0.8rem;
      }

      .input,
      .btn {
        min-height: 2.7rem;
        border-radius: 10px;
        border: 1px solid var(--border);
      }

      .input {
        flex: 1;
        min-width: 240px;
        padding: 0 0.8rem;
      }

      .input-sm {
        flex: 0 1 180px;
        min-width: 160px;
      }

      .btn {
        padding: 0 0.95rem;
        font-weight: 700;
        cursor: pointer;
        background: #fff;
      }

      .btn-primary {
        border-color: #3f5b86;
        background: linear-gradient(135deg, #243858, #1a2d4d);
        color: #fff;
      }

      .btn-danger {
        border-color: #b63333;
        color: #8b0000;
        background: #fff3f3;
      }

      .btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .status {
        margin-top: 0.7rem;
        font-size: 0.9rem;
        font-weight: 700;
      }

      .status.error {
        color: #b30000;
      }

      .status.ok {
        color: var(--ok);
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 0.6rem;
      }

      .summary-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .stat {
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 0.75rem;
      }

      .stat strong {
        display: block;
        margin-bottom: 0.2rem;
      }

      .summary-total {
        color: #243858;
      }

      .summary-pending {
        color: #7a4f00;
      }

      .summary-validated {
        color: #0f6a35;
      }

      .summary-cancelled {
        color: #981e1e;
      }

      .status-chip {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 92px;
        padding: 0.22rem 0.55rem;
        border-radius: 999px;
        font-size: 0.78rem;
        font-weight: 800;
        border: 1px solid transparent;
        text-transform: uppercase;
        letter-spacing: 0.03em;
      }

      .status-pending {
        background: linear-gradient(135deg, #fff6db, #ffe5a8);
        color: #7a4f00;
        border-color: #e0b84f;
      }

      .status-validated {
        background: linear-gradient(135deg, #e7f9ee, #bff0ce);
        color: #0f6a35;
        border-color: #78c495;
      }

      .status-cancelled {
        background: linear-gradient(135deg, #fdecec, #f7c9c9);
        color: #981e1e;
        border-color: #df8080;
      }

      .lead-status-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.35rem;
      }

      .lead-status-btn {
        min-height: 2.1rem;
        padding: 0 0.65rem;
        border-radius: 999px;
        font-size: 0.78rem;
      }

      .lead-status-btn-active {
        opacity: 0.7;
        cursor: default;
      }

      .table-wrap {
        overflow: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 780px;
      }

      th,
      td {
        border-bottom: 1px solid #ece3d6;
        padding: 0.55rem;
        font-size: 0.9rem;
        text-align: left;
      }

      th {
        color: #2e3f62;
        background: #faf6ef;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.6rem;
        margin-top: 0.8rem;
      }

      .link-home {
        color: var(--accent);
        font-weight: 700;
        text-decoration: none;
      }

      @media (max-width: 860px) {
        .stats {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <h1>Dashboard Admin</h1>
        <p>Consultez les leads, les stats de clics/postulations et exportez les donnees en CSV.</p>
        <div class="row" style="margin-top: 0.8rem">
          <input id="adminToken" class="input" type="password" placeholder="Token admin" />
          <button id="loadBtn" class="btn btn-primary">Charger les donnees</button>
          <button id="exportBtn" class="btn">Exporter CSV</button>
          <button id="clearBtn" class="btn btn-danger">Effacer token</button>
        </div>
        <div class="row filters">
          <input id="searchInput" class="input" type="text" placeholder="Recherche nom/email/source" />
          <input id="domainInput" class="input input-sm" type="text" placeholder="Filtrer domaine" />
          <select id="statusInput" class="input input-sm">
            <option value="">Tous statuts</option>
            <option value="pending">En attente</option>
            <option value="validated">Validé</option>
            <option value="cancelled">Annulé</option>
          </select>
          <input id="startDateInput" class="input input-sm" type="date" />
          <input id="endDateInput" class="input input-sm" type="date" />
          <button id="applyFiltersBtn" class="btn">Appliquer filtres</button>
          <button id="resetFiltersBtn" class="btn">Reinitialiser</button>
        </div>
        <p id="status" class="status"></p>
      </section>

      <section class="card">
        <h2>Analytics</h2>
        <div id="stats" class="stats"></div>
      </section>

      <section class="card">
        <h2>Statuts des leads</h2>
        <div id="leadSummary" class="stats summary-grid"></div>
      </section>

      <section class="card">
        <h2>Leads enregistres</h2>
        <p id="leadCount" style="margin-bottom: 0.6rem"></p>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Date</th>
                <th>Nom</th>
                <th>Email</th>
                <th>Domaine</th>
                <th>Niveau</th>
                <th>Statut</th>
                <th>Canal</th>
                <th>Conseiller</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="leadsTableBody"></tbody>
          </table>
        </div>
        <div class="actions">
          <button id="moreBtn" class="btn">Charger plus</button>
          <a class="link-home" href="/">Retour au site</a>
        </div>
      </section>
    </main>

    <script>
      const API_BASE = window.location.origin
      const PAGE_SIZE = 50
      let offset = 0
      let hasMore = false

      const tokenInput = document.getElementById('adminToken')
      const loadBtn = document.getElementById('loadBtn')
      const exportBtn = document.getElementById('exportBtn')
      const clearBtn = document.getElementById('clearBtn')
      const searchInput = document.getElementById('searchInput')
      const domainInput = document.getElementById('domainInput')
      const statusInput = document.getElementById('statusInput')
      const startDateInput = document.getElementById('startDateInput')
      const endDateInput = document.getElementById('endDateInput')
      const applyFiltersBtn = document.getElementById('applyFiltersBtn')
      const resetFiltersBtn = document.getElementById('resetFiltersBtn')
      const moreBtn = document.getElementById('moreBtn')
      const statusEl = document.getElementById('status')
      const statsEl = document.getElementById('stats')
      const leadSummaryEl = document.getElementById('leadSummary')
      const leadCountEl = document.getElementById('leadCount')
      const leadsTableBody = document.getElementById('leadsTableBody')

      const savedToken = window.localStorage.getItem('admin-dashboard-token') || ''
      tokenInput.value = savedToken

      const setStatus = (message, kind = 'ok') => {
        statusEl.textContent = message
        statusEl.className = `status ${kind}`
      }

      const getToken = () => tokenInput.value.trim()

      const buildHeaders = () => {
        const token = getToken()
        return token ? { 'x-admin-token': token } : {}
      }

      const extractApiError = async (response, fallbackMessage) => {
        if (response.status === 401) {
          return 'Token admin invalide ou manquant. Verifiez ADMIN_DASHBOARD_TOKEN dans Vercel.'
        }

        const payload = await response.json().catch(() => null)
        return payload?.error || fallbackMessage
      }

      const formatDate = (iso) => {
        try {
          return new Date(iso).toLocaleString('fr-FR')
        } catch {
          return iso
        }
      }

      const escapeHtml = (value) => {
        const stringValue = value == null ? '' : String(value)

        return stringValue
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#039;')
      }

      const escapeAttribute = (value) => escapeHtml(value).replaceAll('"', '&quot;')

      const normalizeStatus = (status) => {
        const value = String(status || 'pending').toLowerCase()

        if (value === 'validated') {
          return 'validated'
        }

        if (value === 'cancelled') {
          return 'cancelled'
        }

        return 'pending'
      }

      const formatStatusLabel = (status) => {
        if (status === 'validated') {
          return 'Validé'
        }

        if (status === 'cancelled') {
          return 'Annulé'
        }

        return 'En attente'
      }

      const buildFilterParams = () => {
        const params = new URLSearchParams()

        params.set('limit', String(PAGE_SIZE))
        params.set('offset', String(offset))

        const search = searchInput.value.trim()
        const domain = domainInput.value.trim()
        const status = statusInput.value.trim()
        const startDate = startDateInput.value
        const endDate = endDateInput.value

        if (search) {
          params.set('search', search)
        }

        if (domain) {
          params.set('domain', domain)
        }

        if (status) {
          params.set('status', status)
        }

        if (startDate) {
          params.set('startDate', startDate)
        }

        if (endDate) {
          params.set('endDate', endDate)
        }

        return params
      }

      const renderStats = (totals) => {
        const byType = Object.fromEntries(totals.map((item) => [item.eventType, item.total]))
        const cards = [
          ['Visites page', byType.page_view || 0],
          ['Clic WhatsApp', byType.click_whatsapp || 0],
          ['Clic Email', byType.click_email || 0],
          ['Postulations validees', byType.lead_submit_success || 0],
        ]

        statsEl.innerHTML = cards
          .map(([label, value]) => `<article class="stat"><strong>${value}</strong><p>${label}</p></article>`)
          .join('')
      }

      const renderLeadSummary = (summary) => {
        const cards = [
          ['Total leads', summary.total || 0, 'summary-total'],
          ['En attente', summary.pending || 0, 'summary-pending'],
          ['Validés', summary.validated || 0, 'summary-validated'],
          ['Annulés', summary.cancelled || 0, 'summary-cancelled'],
        ]

        leadSummaryEl.innerHTML = cards
          .map(([label, value, className]) => `<article class="stat"><strong class="${className}">${value}</strong><p>${label}</p></article>`)
          .join('')
      }

      const appendLeads = (leads) => {
        const rows = leads
          .map(
            (lead) => `
              <tr>
                <td>${lead.id}</td>
                <td>${escapeHtml(formatDate(lead.createdAt))}</td>
                <td>${escapeHtml(lead.fullName)}</td>
                <td>${escapeHtml(lead.email)}</td>
                <td>${escapeHtml(lead.domain)}</td>
                <td>${escapeHtml(lead.languageLevel)}</td>
                <td><span class="status-chip status-${escapeHtml(normalizeStatus(lead.status))}">${escapeHtml(formatStatusLabel(normalizeStatus(lead.status)))}</span></td>
                <td>${escapeHtml(lead.source || '')}</td>
                <td>${escapeHtml(lead.recommendedAgent || '')}</td>
                <td>
                  <div class="lead-status-actions">
                    <button class="btn lead-status-btn ${normalizeStatus(lead.status) === 'validated' ? 'lead-status-btn-active' : ''}" type="button" data-lead-id="${escapeAttribute(lead.id)}" data-status="validated">Valider</button>
                    <button class="btn lead-status-btn ${normalizeStatus(lead.status) === 'pending' ? 'lead-status-btn-active' : ''}" type="button" data-lead-id="${escapeAttribute(lead.id)}" data-status="pending">En attente</button>
                    <button class="btn lead-status-btn ${normalizeStatus(lead.status) === 'cancelled' ? 'lead-status-btn-active' : ''}" type="button" data-lead-id="${escapeAttribute(lead.id)}" data-status="cancelled">Annuler</button>
                  </div>
                </td>
              </tr>
            `,
          )
          .join('')

        leadsTableBody.insertAdjacentHTML('beforeend', rows)
      }

      const loadAnalytics = async () => {
        const response = await fetch(`${API_BASE}/api/admin/analytics-summary`, {
          headers: buildHeaders(),
        })

        if (!response.ok) {
          throw new Error(await extractApiError(response, 'Impossible de charger les analytics'))
        }

        const payload = await response.json()
        renderStats(Array.isArray(payload.totals) ? payload.totals : [])
      }

      const loadLeadSummary = async () => {
        const response = await fetch(`${API_BASE}/api/admin/leads-summary`, {
          headers: buildHeaders(),
        })

        if (!response.ok) {
          throw new Error(await extractApiError(response, 'Impossible de charger le résumé des leads'))
        }

        const payload = await response.json()
        renderLeadSummary(payload || {})
      }

      const loadLeads = async (append = false) => {
        const response = await fetch(`${API_BASE}/api/admin/leads?${buildFilterParams().toString()}`, {
          headers: buildHeaders(),
        })

        if (!response.ok) {
          throw new Error(await extractApiError(response, 'Impossible de charger les leads'))
        }

        const payload = await response.json()
        const leads = Array.isArray(payload.leads) ? payload.leads : []

        if (!append) {
          leadsTableBody.innerHTML = ''
        }

        appendLeads(leads)
        leadCountEl.textContent = `Total leads: ${payload.total || 0}`
        hasMore = Boolean(payload.hasMore)
        moreBtn.disabled = !hasMore
        offset += leads.length
      }

      const updateLeadStatus = async (leadId, status) => {
        const response = await fetch(`${API_BASE}/api/admin/leads/${leadId}/status`, {
          method: 'PATCH',
          headers: {
            ...buildHeaders(),
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ status }),
        })

        if (!response.ok) {
          throw new Error(await extractApiError(response, 'Impossible de mettre à jour le statut'))
        }

        return response.json()
      }

      const loadAll = async () => {
        const token = getToken()

        if (!token) {
          setStatus('Veuillez saisir un token admin.', 'error')
          return
        }

        loadBtn.disabled = true
        setStatus('Chargement en cours...', 'ok')

        try {
          window.localStorage.setItem('admin-dashboard-token', token)
          offset = 0
          await Promise.all([loadAnalytics(), loadLeadSummary(), loadLeads(false)])
          setStatus('Donnees chargees avec succes.', 'ok')
        } catch (error) {
          if (error instanceof Error && error.message.includes('Token admin invalide ou manquant')) {
            window.localStorage.removeItem('admin-dashboard-token')
          }

          setStatus(error instanceof Error ? error.message : 'Erreur inconnue', 'error')
        } finally {
          loadBtn.disabled = false
        }
      }

      const exportCsv = async () => {
        const token = getToken()

        if (!token) {
          setStatus('Token admin requis pour exporter.', 'error')
          return
        }

        exportBtn.disabled = true

        try {
          const exportParams = buildFilterParams()
          exportParams.delete('limit')
          exportParams.delete('offset')

          const response = await fetch(`${API_BASE}/api/admin/leads/export.csv?${exportParams.toString()}`, {
            headers: buildHeaders(),
          })

          if (!response.ok) {
            throw new Error(await extractApiError(response, 'Export CSV indisponible'))
          }

          const blob = await response.blob()
          const url = URL.createObjectURL(blob)
          const link = document.createElement('a')
          link.href = url
          link.download = 'leads-export.csv'
          link.click()
          URL.revokeObjectURL(url)
          setStatus('Export CSV termine.', 'ok')
        } catch (error) {
          setStatus(error instanceof Error ? error.message : 'Erreur export', 'error')
        } finally {
          exportBtn.disabled = false
        }
      }

      loadBtn.addEventListener('click', loadAll)

      applyFiltersBtn.addEventListener('click', async () => {
        offset = 0
        await loadAll()
      })

      resetFiltersBtn.addEventListener('click', async () => {
        searchInput.value = ''
        domainInput.value = ''
        statusInput.value = ''
        startDateInput.value = ''
        endDateInput.value = ''

        if (getToken()) {
          offset = 0
          await loadAll()
          setStatus('Filtres reinitialises.', 'ok')
          return
        }

        setStatus('Filtres reinitialises. Ajoutez le token puis chargez les donnees.', 'ok')
      })

      moreBtn.addEventListener('click', async () => {
        if (!hasMore) {
          return
        }

        moreBtn.disabled = true

        try {
          await loadLeads(true)
        } catch (error) {
          setStatus(error instanceof Error ? error.message : 'Erreur chargement', 'error')
        } finally {
          moreBtn.disabled = !hasMore
        }
      })

      exportBtn.addEventListener('click', exportCsv)

      leadsTableBody.addEventListener('click', async (event) => {
        const target = event.target

        if (!(target instanceof HTMLElement)) {
          return
        }

        const leadId = target.getAttribute('data-lead-id')
        const status = target.getAttribute('data-status')

        if (!leadId || !status) {
          return
        }

        if (target.classList.contains('lead-status-btn-active')) {
          return
        }

        target.setAttribute('disabled', 'disabled')

        try {
          await updateLeadStatus(leadId, status)
          setStatus('Statut du lead mis à jour.', 'ok')
          offset = 0
          await loadAll()
        } catch (error) {
          setStatus(error instanceof Error ? error.message : 'Erreur statut lead', 'error')
        } finally {
          target.removeAttribute('disabled')
        }
      })

      clearBtn.addEventListener('click', () => {
        tokenInput.value = ''
        window.localStorage.removeItem('admin-dashboard-token')
        setStatus('Token efface.', 'ok')
      })

      if (savedToken) {
        loadAll()
      }
    </script>
  </body>
</html>
